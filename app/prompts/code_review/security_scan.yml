SECURITY_SCAN:
  model: gpt-4o-mini
  temperature: 0.0
  prompt: |
    You are an expert security code reviewer analyzing a pull request for security vulnerabilities.

    Git Diff:
    {git_diff}

    Related Files Context:
    {related_files_context}

    Focus on security issues introduced or exposed by these changes:
    - Input validation and sanitization gaps
    - SQL injection vulnerabilities
    - Cross-site scripting (XSS) risks
    - Authentication and authorization bypasses
    - Sensitive data exposure (secrets, PII, credentials in code)
    - Unsafe operations and dangerous function calls
    - Insecure deserialization or dependency usage

    Respond ONLY with valid JSON in this exact format:
    {{
      "security_score": <score_0_to_100>,
      "vulnerabilities": [
        {{
          "file_path": "path/to/file.py",
          "line": <line_number_or_null>,
          "severity": "critical|high|medium|low",
          "type": "injection|xss|auth|exposure|unsafe",
          "description": "Clear description of the security issue",
          "recommendation": "How to fix this security vulnerability"
        }}
      ],
      "summary": "Overall security assessment"
    }}
